<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Team Schedule</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #F5F4F6;
      color: #05092E;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .app { width: 100%; max-width: 780px; background: #fff; border-radius: 16px; border: 0.5px solid rgba(5,9,46,0.1); overflow: hidden; display: flex; flex-direction: column; }
    .header { background: #05092E; padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .title-block { display: flex; flex-direction: column; gap: 2px; }
    .title-eyebrow { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #91FFD7; }
    .title-main { font-size: 22px; font-weight: 700; color: #F5F4F6; letter-spacing: -0.3px; line-height: 1.15; }
    .title-line { width: 36px; height: 3px; background: #91FFD7; border-radius: 2px; margin-top: 4px; }
    .header-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .header select { background: rgba(255,255,255,0.07); border: 0.5px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 7px 10px; font-size: 13px; color: #F5F4F6; font-family: inherit; cursor: pointer; outline: none; }
    .online-btn { background: #743AED; border: none; border-radius: 8px; padding: 7px 14px; font-size: 13px; color: #fff; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: inherit; white-space: nowrap; transition: opacity 0.15s; }
    .online-btn:hover { opacity: 0.88; }
    .pulse { width: 7px; height: 7px; border-radius: 50%; background: #91FFD7; flex-shrink: 0; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.35)} }
    .body { display: flex; flex: 1; min-height: 420px; }
    .sidebar { background: #05092E; width: 150px; flex-shrink: 0; padding: 1.25rem 0.875rem; display: flex; flex-direction: column; gap: 4px; border-right: 0.5px solid rgba(255,255,255,0.06); }
    .sidebar-label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(245,244,246,0.3); padding: 0 6px; margin-bottom: 6px; }
    .s-tab { border-radius: 8px; padding: 7px 8px; font-size: 13px; display: flex; align-items: center; gap: 7px; color: rgba(245,244,246,0.5); cursor: pointer; transition: all 0.15s; border: none; background: none; font-family: inherit; text-align: left; width: 100%; }
    .s-tab:hover { background: rgba(255,255,255,0.06); color: rgba(245,244,246,0.8); }
    .s-tab.active { background: rgba(116,58,237,0.25); color: #F5F4F6; font-weight: 500; }
    .s-tab.online-highlight { border: 0.5px solid rgba(145,255,215,0.35); }
    .s-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .s-online-dot { width: 6px; height: 6px; border-radius: 50%; background: #91FFD7; margin-left: auto; flex-shrink: 0; }
    .main { flex: 1; padding: 1.5rem; background: #F5F4F6; display: flex; flex-direction: column; gap: 1rem; }
    .online-banner { background: #fff; border: 0.5px solid rgba(5,9,46,0.08); border-radius: 10px; padding: 0.875rem 1rem; }
    .online-banner h3 { font-size: 12px; font-weight: 500; color: #666; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .online-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .online-chip { display: flex; align-items: center; gap: 5px; background: #F5F4F6; border: 0.5px solid rgba(145,255,215,0.6); border-radius: 8px; padding: 4px 10px; font-size: 12px; cursor: pointer; color: #05092E; font-family: inherit; transition: background 0.15s; }
    .online-chip:hover { background: #ebe9f0; }
    .online-chip-dot { width: 6px; height: 6px; border-radius: 50%; background: #91FFD7; }
    .none-msg { font-size: 12px; color: #aaa; font-style: italic; }
    .local-time { font-size: 11px; color: #bbb; margin-left: auto; }
    .card { background: #fff; border: 0.5px solid rgba(5,9,46,0.08); border-radius: 12px; padding: 1.25rem; flex: 1; }
    .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; padding-bottom: 0.875rem; border-bottom: 0.5px solid rgba(5,9,46,0.06); }
    .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 14px; flex-shrink: 0; }
    .card-name { font-size: 16px; font-weight: 600; color: #05092E; }
    .card-sub { font-size: 12px; color: #999; margin-top: 2px; }
    .card-tz { margin-left: auto; font-size: 11px; color: #999; background: #F5F4F6; padding: 3px 8px; border-radius: 6px; border: 0.5px solid rgba(5,9,46,0.08); white-space: nowrap; }
    .online-badge { margin-left: 8px; display: inline-flex; align-items: center; gap: 4px; background: rgba(145,255,215,0.2); color: #0a6040; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 500; }
    .day-grid { display: flex; flex-direction: column; gap: 8px; }
    .day-row { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; }
    .day-row.active-row { background: rgba(145,255,215,0.08); border-radius: 8px; padding: 4px 8px; margin: 0 -8px; border: 0.5px solid rgba(145,255,215,0.25); }
    .day-name { width: 34px; color: #bbb; font-weight: 500; font-size: 12px; flex-shrink: 0; padding-top: 3px; }
    .day-shift { flex: 1; }
    .day-off { color: #ddd; font-style: italic; padding-top: 3px; font-size: 12px; }
    .shift-pill { display: inline-block; background: rgba(116,58,237,0.08); color: #743AED; border-radius: 6px; padding: 3px 10px; font-size: 12px; font-weight: 500; }
    .shift-pill.active-shift { background: rgba(145,255,215,0.2); color: #0a6040; }
    .shift-hrs { font-size: 11px; color: #bbb; margin-top: 2px; }
    @media (max-width: 560px) {
      .body { flex-direction: column; }
      .sidebar { width: 100%; flex-direction: row; flex-wrap: wrap; padding: 0.75rem; gap: 6px; border-right: none; border-bottom: 0.5px solid rgba(255,255,255,0.06); }
      .sidebar-label { display: none; }
      .s-tab { width: auto; }
      .header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title-block">
      <span class="title-eyebrow">Global Team</span>
      <span class="title-main">Schedule</span>
      <div class="title-line"></div>
    </div>
    <div class="header-controls">
      <select id="tz" onchange="renderCard()">
        <option value="PDT">PDT — Los Angeles (UTC-7)</option>
        <option value="CDT">CDT — Chicago (UTC-5)</option>
        <option value="EDT">EDT — New York (UTC-4)</option>
        <option value="BRT">BRT — São Paulo (UTC-3)</option>
        <option value="CEST">CEST — Malta (UTC+2)</option>
        <option value="PHT">PHT — Manila (UTC+8)</option>
        <option value="UTC">UTC</option>
      </select>
      <button class="online-btn" onclick="checkOnline()">
        <span class="pulse"></span> Who's online now?
      </button>
    </div>
  </div>
  <div class="body">
    <div class="sidebar">
      <div class="sidebar-label">Members</div>
      <div id="sidebar-tabs"></div>
    </div>
    <div class="main">
      <div id="online-banner" style="display:none"></div>
      <div id="card-area"></div>
    </div>
  </div>
</div>

<script>
  const TZ_OFFSETS = { PDT:-7, CDT:-5, EDT:-4, BRT:-3, CEST:2, PHT:8, UTC:0 };
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const MEMBERS = [
    { name:"Yesenia", location:"CHI", color:"#8B9DC3", initials:"YC", displayTZ:"CDT",
      scheduleUTC:[
        {day:"Mon",start:15,end:23},{day:"Tue",start:15,end:23},{day:"Wed",start:15,end:23},
        {day:"Thu",start:15,end:23},{day:"Fri",start:15,end:23},{day:"Sat",off:true},{day:"Sun",off:true}
      ]},
    { name:"Ollie", location:"EU — Malta", color:"#7BC87B", initials:"OE", displayTZ:"CEST",
      scheduleUTC:[
        {day:"Mon",start:7,end:15},{day:"Tue",start:7,end:15},{day:"Wed",start:7,end:15},
        {day:"Thu",start:7,end:15},{day:"Fri",start:7,end:15},{day:"Sat",off:true},{day:"Sun",off:true}
      ]},
    { name:"Wemerson", location:"BRZ — São Paulo", color:"#6BC9A0", initials:"WB", displayTZ:"BRT",
      scheduleUTC:[
        {day:"Mon",start:11,end:21},{day:"Tue",start:11,end:20},{day:"Wed",start:11,end:20},
        {day:"Thu",off:true},{day:"Fri",off:true},{day:"Sat",start:9,end:21},{day:"Sun",off:true}
      ]},
    { name:"Romer", location:"PH — Manila", color:"#E8C56A", initials:"RP", displayTZ:"CDT",
      scheduleUTC:[
        {day:"Sun",start:9,end:21},{day:"Mon",start:23,end:33},
        {day:"Tue",start:23,end:33},{day:"Wed",start:23,end:31},
        {day:"Thu",off:true},{day:"Fri",off:true},{day:"Sat",off:true}
      ]},
    { name:"Mando", location:"PH — Manila", color:"#A89CC8", initials:"MP", displayTZ:"CDT",
      scheduleUTC:[
        {day:"Mon",off:true},{day:"Tue",off:true},{day:"Wed",off:true},
        {day:"Thu",start:23,end:31},{day:"Fri",start:23,end:33},
        {day:"Sat",start:21,end:33},{day:"Sun",start:5,end:15}
      ]}
  ];

  let activeMember = 0;
  let onlineSet = new Set();

  function getNowUTC() {
    const n = new Date();
    return n.getUTCHours() + n.getUTCMinutes() / 60;
  }

  function isOnline(member) {
    const utcHour = getNowUTC();
    const utcDayIdx = new Date().getUTCDay();
    return member.scheduleUTC.some(function(s) {
      if (s.off) return false;
      const shiftDayIdx = DAYS.indexOf(s.day);
      const nowAbs = utcDayIdx * 24 + utcHour;
      return nowAbs >= shiftDayIdx * 24 + s.start && nowAbs < shiftDayIdx * 24 + s.end;
    });
  }

  function fmt(h) {
    const norm = ((h % 24) + 24) % 24;
    const ampm = norm >= 12 ? 'pm' : 'am';
    const hr = norm % 12 === 0 ? 12 : norm % 12;
    return hr + ampm;
  }

  function getDayNote(h) {
    if (h < 0) return ' (prev day)';
    if (h >= 24) return ' (next day)';
    return '';
  }

  function checkOnline() {
    onlineSet = new Set();
    MEMBERS.forEach(function(m, i) { if (isOnline(m)) onlineSet.add(i); });
    const banner = document.getElementById('online-banner');
    const timeStr = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    if (onlineSet.size === 0) {
      banner.innerHTML = '<div class="online-banner"><h3><span class="pulse" style="background:#aaa;animation:none"></span> Nobody online right now <span class="local-time">your local time: ' + timeStr + '</span></h3><p class="none-msg">Check back later or pick a timezone to see upcoming shifts.</p></div>';
    } else {
      let chips = '';
      onlineSet.forEach(function(i) {
        chips += '<button class="online-chip" onclick="selectMember(' + i + ')"><span class="online-chip-dot"></span>' + MEMBERS[i].name + '</button>';
      });
      banner.innerHTML = '<div class="online-banner"><h3><span class="pulse"></span> Online now <span class="local-time">your local time: ' + timeStr + '</span></h3><div class="online-list">' + chips + '</div></div>';
    }
    banner.style.display = 'block';
    renderSidebar();
    renderCard();
  }

  function renderSidebar() {
    let html = '';
    MEMBERS.forEach(function(m, i) {
      const isActive = i === activeMember ? 'active' : '';
      const isOnlineHighlight = onlineSet.has(i) ? 'online-highlight' : '';
      const onlineDot = onlineSet.has(i) ? '<span class="s-online-dot"></span>' : '';
      html += '<button class="s-tab ' + isActive + ' ' + isOnlineHighlight + '" onclick="selectMember(' + i + ')">'
            + '<span class="s-dot" style="background:' + m.color + '"></span>' + m.name + onlineDot
            + '</button>';
    });
    document.getElementById('sidebar-tabs').innerHTML = html;
  }

  function selectMember(i) {
    activeMember = i;
    renderSidebar();
    renderCard();
  }

  function renderCard() {
    const m = MEMBERS[activeMember];
    const toTZ = document.getElementById('tz').value;
    const offset = TZ_OFFSETS[toTZ];
    const memberOnline = onlineSet.has(activeMember);
    const utcNow = getNowUTC();
    const utcDayIdx = new Date().getUTCDay();

    let rows = '';
    m.scheduleUTC.forEach(function(s) {
      if (s.off) {
        rows += '<div class="day-row"><span class="day-name">' + s.day + '</span><span class="day-off">off</span></div>';
      } else {
        const ds = s.start + offset;
        const de = s.end + offset;
        const hrs = s.end - s.start;
        const label = fmt(ds) + getDayNote(ds) + ' – ' + fmt(de) + getDayNote(de);
        const shiftDayIdx = DAYS.indexOf(s.day);
        const nowAbs = utcDayIdx * 24 + utcNow;
        const isActive = memberOnline && nowAbs >= shiftDayIdx * 24 + s.start && nowAbs < shiftDayIdx * 24 + s.end;
        const activeRow = isActive ? 'active-row' : '';
        const activePill = isActive ? 'active-shift' : '';
        const dot = isActive ? ' ●' : '';
        rows += '<div class="day-row ' + activeRow + '"><span class="day-name">' + s.day + '</span>'
              + '<div class="day-shift"><span class="shift-pill ' + activePill + '">' + label + dot + '</span>'
              + '<div class="shift-hrs">' + hrs + ' hrs</div></div></div>';
      }
    });

    const tzLabel = toTZ === m.displayTZ ? toTZ + ' (home)' : m.displayTZ + ' → ' + toTZ;
    const badge = memberOnline ? '<span class="online-badge"><span style="width:5px;height:5px;border-radius:50%;background:#0a6040;display:inline-block;margin-right:3px"></span>online</span>' : '';

    document.getElementById('card-area').innerHTML =
      '<div class="card">'
      + '<div class="card-header">'
      + '<div class="avatar" style="background:' + m.color + '18;color:' + m.color + '">' + m.initials + '</div>'
      + '<div><div class="card-name">' + m.name + badge + '</div><div class="card-sub">' + m.location + '</div></div>'
      + '<div class="card-tz">' + tzLabel + '</div>'
      + '</div>'
      + '<div class="day-grid">' + rows + '</div>'
      + '</div>';
  }

  renderSidebar();
  renderCard();
</script>
</body>
</html>
